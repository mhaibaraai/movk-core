minimumReleaseAgeExclude:
  - '@vitest/expect@4.1.8'
  - '@vitest/mocker@4.1.8'
  - '@vitest/pretty-format@4.1.8'
  - '@vitest/runner@4.1.8'
  - '@vitest/snapshot@4.1.8'
  - '@vitest/spy@4.1.8'
  - '@vitest/utils@4.1.8'
  - vitest@4.1.8
  - '@ai-sdk/gateway@3.0.122'
  - '@ai-sdk/vue@3.0.194'
  - '@iconify-json/simple-icons@1.2.85'
  - '@movk/nuxt-docs@1.19.4'
  - ai@6.0.194
shellEmulator: true

trustPolicy: no-downgrade

packages:
  - docs

allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  esbuild: false
  sharp: true
  unrs-resolver: false
  vue-demi: false
