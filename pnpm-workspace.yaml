shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - langium
  - chokidar
  - undici-types
  - semver

packages:
  - docs

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - esbuild
  - unrs-resolver
  - vue-demi

onlyBuiltDependencies:
  - better-sqlite3
  - sharp
